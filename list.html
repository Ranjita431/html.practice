<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>An unordered HTML list</h2>

<ul>
  <li>Coffee</li>
  <li>Tea</li>
  <li>Milk</li>
</ul>  
<h2>An ordered HTML list</h2>
<ol>
  <li>Coffee</li>
  <li>Tea</li>
  <li>Milk</li>
</ol>
<h2>HTML list with nested lists</h2>
<ul>
  <li>Coffee
    <ul>
      <li>Black coffee</li>
      <li>With milk</li>
    </ul>
  </li>
  <li>Tea
    <ul>
      <li>Black tea</li>
      <li>With lemon</li>
    </ul>
  </li>
  <li>Milk</li>
</ul>

</body>
</html>
