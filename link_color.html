<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link {
            color: green; /* Color of unvisited links */
        }

        a:visited {
            color: purple; /* Color of visited links */
        }

        a:hover {
            color: orange; /* Color when mouse hovers over link */
        }

        a:active {
            color: red; /* Color of active link */
        }
    </style>
</head>
<body>
    <h2>Link Colors</h2>

<p>You can change the default colors of links</p>

<a href="html_images.asp" target="_blank">HTML Images</a> 
</body>
</html>
